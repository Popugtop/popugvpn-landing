services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
    image: popugvpn-landing:latest
    container_name: popugvpn-landing
    restart: always
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
